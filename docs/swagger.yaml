openapi: 3.0.0
info:
  title: CreativeOS Auth API
  version: 3.0.0
  description: >
    JWT Auth API with two separate models — Admin and User.
    Admins login and manage users. Users can only login with credentials provided by admin.
    Every user stores a reference to the admin who created them (createdBy).

servers:
  - url: http://localhost:5000

tags:
  - name: Admin Auth
    description: Admin registration and login (Admin model)
  - name: User Auth
    description: User login only — no self-registration (User model)
  - name: Admin - User Management
    description: Admin-only CRUD on users. Requires Admin Bearer token.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    AdminResponse:
      type: object
      properties:
        _id:
          type: string
          example: "60a1b2c3d4e5f6a7b8c9d0e1"
        name:
          type: string
          example: "Super Admin"
        email:
          type: string
          example: "admin@creativeos.com"
        role:
          type: string
          example: "admin"
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5..."
        resetPasswordToken:
          type: string
          nullable: true
          description: Hashed reset token stored in DB (null when not requested)
          example: null
        resetPasswordExpire:
          type: string
          format: date-time
          nullable: true
          description: Expiry time of reset token (null when not requested)
          example: null

    CreatedByAdmin:
      type: object
      description: Admin who created this user (populated from Admin model)
      properties:
        _id:
          type: string
          example: "60a1b2c3d4e5f6a7b8c9d0e1"
        name:
          type: string
          example: "Super Admin"
        email:
          type: string
          example: "admin@creativeos.com"

    UserResponse:
      type: object
      properties:
        _id:
          type: string
          example: "69cce50d3b59c6cca8e56634"
        name:
          type: string
          example: "Naga"
        email:
          type: string
          example: "naga@example.com"
        role:
          type: string
          example: "user"
        createdBy:
          $ref: '#/components/schemas/CreatedByAdmin'
        createdAt:
          type: string
          format: date-time
          example: "2026-04-01T09:27:41.058Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-01T09:27:41.058Z"

    UserLoginResponse:
      allOf:
        - $ref: '#/components/schemas/UserResponse'
        - type: object
          properties:
            token:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5..."

    CreateUserResponse:
      type: object
      properties:
        _id:
          type: string
          example: "69cce50d3b59c6cca8e56634"
        name:
          type: string
          example: "Naga"
        email:
          type: string
          example: "naga@example.com"
        role:
          type: string
          example: "user"
        createdBy:
          type: string
          description: Admin ObjectId who created this user
          example: "60a1b2c3d4e5f6a7b8c9d0e1"
        plainPassword:
          type: string
          description: Share this plain password with the user to login
          example: "123456"
        message:
          type: string
          example: "User created successfully"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Invalid credentials"

paths:

  /api/auth/admin/register:
    post:
      summary: Register admin — one-time setup (Admin model)
      tags: [Admin Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: "Super Admin"
                email:
                  type: string
                  example: "admin@creativeos.com"
                password:
                  type: string
                  example: "admin@123"
      responses:
        '201':
          description: Admin registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                    example: "60a1b2c3d4e5f6a7b8c9d0e1"
                  name:
                    type: string
                    example: "Super Admin"
                  email:
                    type: string
                    example: "admin@creativeos.com"
                  role:
                    type: string
                    example: "admin"
                  message:
                    type: string
                    example: "Admin registered successfully"
        '400':
          description: Admin already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/admin/login:
    post:
      summary: Admin login — returns Admin JWT token
      tags: [Admin Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: "admin@creativeos.com"
                password:
                  type: string
                  example: "admin@123"
      responses:
        '200':
          description: Admin logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminResponse'
        '401':
          description: Invalid admin credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/admin/forgot-password:
    post:
      summary: Send password reset link to admin email
      tags: [Admin Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: "admin@creativeos.com"
      responses:
        '200':
          description: Reset link sent to email
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Reset link sent to email"
        '404':
          description: Admin not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error / Email could not be sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/admin/reset-password/{token}:
    patch:
      summary: Reset admin password using token from email
      tags: [Admin Auth]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          example: "a1b2c3d4e5f6..."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword:
                  type: string
                  example: "newadmin@123"
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password reset successfully"
        '400':
          description: Invalid or expired token / Password too short
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/user/login:
    post:
      summary: User login — credentials provided by admin (User model)
      tags: [User Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: "naga@example.com"
                password:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: User logged in — includes populated createdBy admin info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/user/change-password:
    patch:
      summary: Change user password
      tags: [User Auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  example: "123456"
                newPassword:
                  type: string
                  example: "newpass456"
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password changed successfully"
        '400':
          description: Both fields are required / Password too short
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Current password is incorrect / Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/admin/users:
    post:
      summary: Admin creates a new user — stores createdBy admin ID
      tags: [Admin - User Management]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                  example: "Naga"
                email:
                  type: string
                  example: "naga@example.com"
                
      responses:
        '201':
          description: User created — createdBy set to req.admin._id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
        '400':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not an admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Get all users — populated with createdBy admin name & email
      tags: [Admin - User Management]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All users across all admins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '401':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not an admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/admin/users/my:
    get:
      summary: Get only users created by the logged-in admin
      tags: [Admin - User Management]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Users created by this specific admin (filtered by createdBy)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '401':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not an admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/admin/users/{id}:
    delete:
      summary: Delete a user by ID
      tags: [Admin - User Management]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: MongoDB ObjectId of the user
          example: "69cce50d3b59c6cca8e56634"
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User deleted successfully"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not an admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'