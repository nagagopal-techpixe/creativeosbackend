openapi: 3.0.0
info:
  title: CreativeOS Auth API
  version: 3.0.0
  description: >
    JWT Auth API with two separate models — Admin and User.
    Admins login and manage users. Users can only login with credentials provided by admin.
    Every user stores a reference to the admin who created them (createdBy).

servers:
  - url: http://localhost:5000

tags:
  - name: Admin Auth
    description: Admin registration and login (Admin model)
  - name: User Auth
    description: User login only — no self-registration (User model)
  - name: Admin - User Management
    description: Admin-only CRUD on users. Requires Admin Bearer token.
  - name: Categories
    description: Category management. Admin can create, Users can view.
  - name: User - Module Permissions
    description: Module permission checks for users.
  - name: Models
    description: Model management. Admin can create & update, Users can view.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    AdminResponse:
      type: object
      properties:
        _id:
          type: string
          example: "60a1b2c3d4e5f6a7b8c9d0e1"
        name:
          type: string
          example: "Super Admin"
        email:
          type: string
          example: "admin@creativeos.com"
        role:
          type: string
          example: "admin"
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5..."
        resetPasswordToken:
          type: string
          nullable: true
          example: null
        resetPasswordExpire:
          type: string
          format: date-time
          nullable: true
          example: null

    CreatedByAdmin:
      type: object
      properties:
        _id:
          type: string
          example: "60a1b2c3d4e5f6a7b8c9d0e1"
        name:
          type: string
          example: "Super Admin"
        email:
          type: string
          example: "admin@creativeos.com"

    UserResponse:
      type: object
      properties:
        _id:
          type: string
          example: "69cce50d3b59c6cca8e56634"
        name:
          type: string
          example: "Naga"
        email:
          type: string
          example: "naga@example.com"
        role:
          type: string
          example: "user"
        createdBy:
          $ref: '#/components/schemas/CreatedByAdmin'
        createdAt:
          type: string
          format: date-time
          example: "2026-04-01T09:27:41.058Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-01T09:27:41.058Z"

    UserLoginResponse:
      allOf:
        - $ref: '#/components/schemas/UserResponse'
        - type: object
          properties:
            token:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5..."

    CreateUserResponse:
      type: object
      properties:
        _id:
          type: string
          example: "69cce50d3b59c6cca8e56634"
        name:
          type: string
          example: "Naga"
        email:
          type: string
          example: "naga@example.com"
        role:
          type: string
          example: "user"
        createdBy:
          type: string
          example: "60a1b2c3d4e5f6a7b8c9d0e1"
        plainPassword:
          type: string
          example: "123456"
        message:
          type: string
          example: "User created successfully"

    # ── Categories ────────────────────────────────────────────
    Category:
      type: object
      properties:
        _id:
          type: string
          example: "664f1b2c9e1a2b3c4d5e6f7a"
        category_name:
          type: string
          example: "Electronics"
        createdAt:
          type: string
          format: date-time
          example: "2026-04-01T09:27:41.058Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-01T09:27:41.058Z"

    CategoryInput:
      type: object
      required:
        - category_name
      properties:
        category_name:
          type: string
          example: "Electronics"

    # ── Models ────────────────────────────────────────────────
    PopulatedCategory:
      type: object
      description: Populated category reference
      properties:
        _id:
          type: string
          example: "664f1b2c9e1a2b3c4d5e6f7a"
        category_name:
          type: string
          example: "Electronics"

    Model:
      type: object
      properties:
        _id:
          type: string
          example: "665a2c3d4e5f6a7b8c9d0e1f"
        model_name:
          type: string
          example: "GPT-4o"
        category:
          $ref: '#/components/schemas/PopulatedCategory'
        link:
          type: string
          example: "https://example.com/model/gpt4o"
        model_attributes:
          type: array
          items:
            type: string
          example: ["text", "vision", "audio"]
        createdAt:
          type: string
          format: date-time
          example: "2026-04-01T09:27:41.058Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-01T09:27:41.058Z"

    ModelInput:
      type: object
      required:
        - model_name
        - category
        - link
      properties:
        model_name:
          type: string
          example: "GPT-4o"
        category:
          type: string
          description: MongoDB ObjectId of the category
          example: "664f1b2c9e1a2b3c4d5e6f7a"
        link:
          type: string
          example: "https://example.com/model/gpt4o"
        model_attributes:
          type: array
          items:
            type: string
          example: ["text", "vision", "audio"]

    ModelUpdateInput:
      type: object
      description: All fields are optional — only provided fields will be updated
      properties:
        model_name:
          type: string
          example: "GPT-4o Turbo"
        category:
          type: string
          description: MongoDB ObjectId of the category
          example: "664f1b2c9e1a2b3c4d5e6f7a"
        link:
          type: string
          example: "https://example.com/model/gpt4o-turbo"
        model_attributes:
          type: array
          items:
            type: string
          example: ["text", "vision", "audio", "code"]

    # ── Shared ────────────────────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        statuscode:
          type: integer

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Invalid credentials"
        success:
          type: boolean
          example: false
        statuscode:
          type: integer

paths:

  # ─────────────────────────────────────────────────────────────
  # Admin Auth
  # ─────────────────────────────────────────────────────────────
  /api/auth/admin/register:
    post:
      summary: Register admin — one-time setup (Admin model)
      tags: [Admin Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: "Super Admin"
                email:
                  type: string
                  example: "admin@creativeos.com"
                password:
                  type: string
                  example: "admin@123"
      responses:
        '201':
          description: Admin registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                    example: "60a1b2c3d4e5f6a7b8c9d0e1"
                  name:
                    type: string
                    example: "Super Admin"
                  email:
                    type: string
                    example: "admin@creativeos.com"
                  role:
                    type: string
                    example: "admin"
                  message:
                    type: string
                    example: "Admin registered successfully"
        '400':
          description: Admin already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/admin/login:
    post:
      summary: Admin login — returns Admin JWT token
      tags: [Admin Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: "admin@creativeos.com"
                password:
                  type: string
                  example: "admin@123"
      responses:
        '200':
          description: Admin logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminResponse'
        '401':
          description: Invalid admin credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/admin/forgot-password:
    post:
      summary: Send password reset link to admin email
      tags: [Admin Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  example: "admin@creativeos.com"
      responses:
        '200':
          description: Reset link sent to email
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Reset link sent to email"
        '404':
          description: Admin not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error / Email could not be sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/admin/reset-password/{token}:
    patch:
      summary: Reset admin password using token from email
      tags: [Admin Auth]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          example: "a1b2c3d4e5f6..."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword:
                  type: string
                  example: "newadmin@123"
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password reset successfully"
        '400':
          description: Invalid or expired token / Password too short
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─────────────────────────────────────────────────────────────
  # User Auth
  # ─────────────────────────────────────────────────────────────
  /api/auth/user/login:
    post:
      summary: User login — credentials provided by admin (User model)
      tags: [User Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: "naga@example.com"
                password:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: User logged in — includes populated createdBy admin info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/user/change-password:
    patch:
      summary: Change user password
      tags: [User Auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  example: "123456"
                newPassword:
                  type: string
                  example: "newpass456"
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password changed successfully"
        '400':
          description: Both fields required / Password too short
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Current password incorrect / Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─────────────────────────────────────────────────────────────
  # Admin - User Management
  # ─────────────────────────────────────────────────────────────
  /api/auth/admin/users:
    post:
      summary: Admin creates a new user — stores createdBy admin ID
      tags: [Admin - User Management]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                  example: "Naga"
                email:
                  type: string
                  example: "naga@example.com"
      responses:
        '201':
          description: User created — createdBy set to req.admin._id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
        '400':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not an admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Get all users — populated with createdBy admin name & email
      tags: [Admin - User Management]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All users across all admins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '401':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not an admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/admin/users/my:
    get:
      summary: Get only users created by the logged-in admin
      tags: [Admin - User Management]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Users filtered by createdBy this admin
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '401':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not an admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/admin/users/{id}:
    delete:
      summary: Delete a user by ID
      tags: [Admin - User Management]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "69cce50d3b59c6cca8e56634"
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User deleted successfully"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not an admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─────────────────────────────────────────────────────────────
  # User - Module Permissions
  # ─────────────────────────────────────────────────────────────
  /api/user/video-builder:
    post:
      summary: Get module permissions for a specific builder
      tags: [User - Module Permissions]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                buildername:
                  type: string
                  example: "my-builder"
      responses:
        '200':
          description: Module permissions retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Module permissions retrieved successfully"
                  data:
                    type: object
                    properties:
                      builderName:
                        type: string
                        example: "my-builder"
                      modules:
                        type: array
                        items:
                          type: object
                          properties:
                            moduleName:
                              type: string
                              example: "builder"
                            permissions:
                              type: array
                              items:
                                type: string
                                example: "view"
                  statuscode:
                    type: integer
                    example: 200
        '400':
          description: Missing builder name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─────────────────────────────────────────────────────────────
  # Categories
  # ─────────────────────────────────────────────────────────────
  /api/admin/categories:
    post:
      summary: Create a new category
      tags: [Categories]
      security:
        - BearerAuth: []
      description: >
        Creates a new category. **Admin access required** (`protectAdmin`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryInput'
            example:
              category_name: "Electronics"
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Category'
              example:
                success: true
                message: "Category created successfully"
                data:
                  _id: "664f1b2c9e1a2b3c4d5e6f7a"
                  category_name: "Electronics"
                  createdAt: "2026-04-01T10:00:00.000Z"
                  updatedAt: "2026-04-01T10:00:00.000Z"
                statuscode: 201
        '400':
          description: Category name is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Category already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Get all categories
      tags: [Categories]
      security:
        - BearerAuth: []
      description: >
        Returns all categories sorted by newest first. **User access required** (`protectUser`).
      responses:
        '200':
          description: Categories fetched successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      count:
                        type: integer
                        example: 2
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'
              example:
                success: true
                message: "Categories fetched successfully"
                count: 2
                data:
                  - _id: "664f1b2c9e1a2b3c4d5e6f7a"
                    category_name: "Electronics"
                  - _id: "664f1b2c9e1a2b3c4d5e6f7b"
                    category_name: "Clothing"
                statuscode: 200
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/categories/{id}:
    get:
      summary: Get a category by ID
      tags: [Categories]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "664f1b2c9e1a2b3c4d5e6f7a"
      responses:
        '200':
          description: Category fetched successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Category'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─────────────────────────────────────────────────────────────
  # Models
  # ─────────────────────────────────────────────────────────────
  /api/admin/models:
    post:
      summary: Create a new model
      tags: [Models]
      security:
        - BearerAuth: []
      description: >
        Creates a new model linked to a category. **Admin access required** (`protectAdmin`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelInput'
            example:
              model_name: "GPT-4o"
              category: "664f1b2c9e1a2b3c4d5e6f7a"
              link: "https://example.com/model/gpt4o"
              model_attributes: ["text", "vision", "audio"]
      responses:
        '201':
          description: Model created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Model'
              example:
                success: true
                message: "Model created successfully"
                data:
                  _id: "665a2c3d4e5f6a7b8c9d0e1f"
                  model_name: "GPT-4o"
                  category:
                    _id: "664f1b2c9e1a2b3c4d5e6f7a"
                    category_name: "Electronics"
                  link: "https://example.com/model/gpt4o"
                  model_attributes: ["text", "vision", "audio"]
                  createdAt: "2026-04-01T10:00:00.000Z"
                  updatedAt: "2026-04-01T10:00:00.000Z"
                statuscode: 201
        '400':
          description: model_name, category and link are required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: "model_name, category and link are required"
                statuscode: 400
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: "Category not found"
                statuscode: 404
